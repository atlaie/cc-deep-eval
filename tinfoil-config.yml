# tinfoil-config-pysyft-spike.yml — §3.2 feasibility spike.
#
# Bare PySyft Datasite image, no vLLM, no encoder. Differs from the egress
# config in three ways:
#   1. No GPUs, no model wrap — PySyft is the entire workload here.
#   2. shim.paths must enumerate PySyft's HTTP route inventory. Run Step 1
#      (pysyft_spike_local.py) first; it writes openapi_paths.txt. Paste
#      the contents into the `paths:` list below.
#   3. healthcheck hits PySyft's /api/v2/metadata (always present, unauth).
#
# Deploy after committing:
#   cp tinfoil-config-pysyft-spike.yml tinfoil-config.yml
#   git add tinfoil-config.yml
#   git commit -m "deploy: v0.0.1-pysyft-spike"
#   git tag v0.0.1-pysyft-spike
#   git push --tags
#
# Or one-shot via tinfoil-cli (sidesteps the cc-deep-eval workflow):
#   tinfoil container create pysyft-spike \
#       --repo atlaie/cc-deep-eval --tag v0.0.1-pysyft-spike \
#       --disable-cc-mode --debug \
#       --host control.inf8.tinfoil.sh --yes

cvm-version: 0.7.5
cpus: 4
gpus: 0          # PySyft only — no model.
memory: 8192     # 8 GB; Datasite + SQLite is small.

# No `models:` stanza — the spike doesn't wrap a model.

containers:
  - name: "cc-deep-eval-pysyft-spike"
    # Replace with the digest emitted by your build-image.yml for the
    # prepilot-vllm-lens-pysyft-spike image.
    image: "ghcr.io/atlaie/prepilot-vllm-lens-pysyft-spike@sha256:sha256:797bc99622ca28c24bf48f5db07773a0bfbf230be4204b809319bd30201f40cf"
    runtime: runc      # no nvidia runtime — no GPU.
    restart: always
    healthcheck:
      # Inside the container, no shim — hit PySyft's metadata directly on
      # the loopback. PySyft 0.9.5 returns 200 on /api/v2/metadata pre-auth.
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/v2/metadata"]
      interval: 30s
      timeout: 5s
      start_period: 5m   # orchestra.launch wraps up in ~1-2 min; 5 is slack.

shim:
  upstream-port: 8000
  authenticated: true
  # PySyft 0.9.5 HTTP surface, dumped from /openapi.json on a live 0.9.5
  # Datasite. RPC for custom_api calls goes through /api/v2/api_call (a
  # single endpoint that receives a serialised syft call object), NOT
  # per-endpoint routes — so the allowlist is short.
  #
  # Excluded:
  #   /api/v2/stream/{peer_uid}/{url_path}/  → FastAPI path params; Tinfoil
  #     shim does exact-path matching, no wildcard. Streaming isn't used by
  #     the spike's login → api_call → response flow. If Phase 1 needs it
  #     (e.g. job-status polling on long-running endpoints), escalate to
  #     Tinfoil engineering for wildcard / prefix support.
  authenticated-endpoints:
    - /api/v2/
    - /api/v2/api
    - /api/v2/api_call
    - /api/v2/login
    - /api/v2/metadata
    - /api/v2/metadata_capnp
    - /api/v2/register
    - /api/v2/forgot_password
    - /api/v2/reset_password
  paths:
    - /api/v2/
    - /api/v2/api
    - /api/v2/api_call
    - /api/v2/login
    - /api/v2/metadata
    - /api/v2/metadata_capnp
    - /api/v2/register
    - /api/v2/forgot_password
    - /api/v2/reset_password
