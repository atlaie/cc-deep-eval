# tinfoil-config-pysyft.yml - PySyft build deployment for GLM-5.1-FP8.
#
# Layered on top of prepilot-vllm-lens-egress (same vLLM + encoder stack);
# adds PySyft 0.9.5 Datasite as the public-port frontend. Port layout vs
# tinfoil-config-egress.yml:
#
#   egress config       ──►  this config
#   public  8000: egress    public  8000: PySyft Datasite
#   loopback 8001: vLLM     loopback 8001: vLLM (unchanged)
#                           loopback 8002: egress_service
#
# Deploy (matches the cp-then-commit pattern used for -egress / -grad):
#   cp tinfoil-config-pysyft.yml tinfoil-config.yml
#   git add tinfoil-config.yml
#   git commit -m "deploy: v0.0.2-pysyft (convergence + worker-pool fix)"
#   git tag    v0.0.2-pysyft
#   git push --tags
#
# ── CONVERGENCE + M5 WORKER-POOL CHANGES IN THIS REVISION ──────────────────
#  1. environment: block added (see container below). SETS:
#       - SYFT_N_CONSUMERS=16        (was 4 baked in Dockerfile) — M5 wedge fix
#       - SYFT_ADMIN_PASSWORD=...    (kill the `changethis` default warning)
#       - ENGAGEMENT_*_BUDGET=...    (env-driven engagement budgets; convergence)
#  2. image digest must point at the rebuilt prepilot-vllm-lens-pysyft that
#     bakes: corrected _common.py (response_assembly rename + glm-5-1 model
#     name), endpoint files with the hot-override shim REMOVED, and the
#     env-var engagement_ledger.py.
#
# ⚠️  THE `environment:` FIELD NAME / SHAPE IS NOT YET CONFIRMED against the
#     Tinfoil Containers Configuration Reference. The handoff notes Tinfoil
#     supports env vars but no existing config in this repo uses them. BEFORE
#     committing: verify in Tinfoil's docs whether the field is `environment:`
#     (compose-style list, as written here), `env:` (map), or something else.
#     If the field is wrong the deploy may ignore it SILENTLY and you'll get
#     the old SYFT_N_CONSUMERS=4 behaviour back. FALLBACK that is guaranteed to
#     work regardless of the config schema: bake the values as ENV defaults in
#     Dockerfile.pysyft (SYFT_N_CONSUMERS=16) and rebuild — see REDEPLOY_NOTES.md.

cvm-version: 0.7.5
cpus: 32
gpus: 8
memory: 524288   # 512 GB; org-waivered. Same as the egress deploy.

models:
  - name: "glm-5-1-fp8"
    repo: "zai-org/GLM-5.1-FP8@f396cf805182f4ca10fa675e1a99815b3ca384db"
    mpk: "fd70ffcf2c2ca3954546b3105150414bcba35838a6ee1a06c283887ad35287ab_756209401856_e085e6ab-593d-5f80-87e7-4a54100774cb"

containers:
  - name: "cc-deep-eval-pysyft"
    # REBUILD REQUIRED: point at the convergence image digest (corrected
    # _common.py, shim-free endpoints, env-var ledger).
    image: "ghcr.io/atlaie/prepilot-vllm-lens-pysyft@sha256:4607ef5dc9b0a03b46f68a48296d8647f8d4eaab1d369a792a08ffc30bae5120"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    # ⚠️ VERIFY FIELD NAME against Tinfoil Configuration Reference before commit.
    # Compose-style list form (key=value strings). If Tinfoil uses a map, this
    # becomes:  environment: { SYFT_N_CONSUMERS: "16", ... }
    environment:
      # --- M5 worker-pool fix: more consumers so a burst doesn't exhaust the
      #     pool. NOTE: if docker logs show consumers DYING (not just busy),
      #     this alone is insufficient — a worker-restart supervisor or an
      #     endpoint-side exception fix is also needed. See REDEPLOY_NOTES.md.
      - SYFT_N_CONSUMERS=16
      # --- kill the default-password warning; use the Tinfoil org secret.
      - SYFT_ADMIN_PASSWORD=${SYFT_ADMIN_PASSWORD}
      # --- convergence: env-driven engagement budgets (data-owner provisions
      #     the auditor budget at deploy time; no code edit, no runtime hack).
      #     Generous defaults for the measurement matrix; tighten per pilot.
      - ENGAGEMENT_TOKEN_BUDGET=1000000
      - ENGAGEMENT_PLOT_BUDGET=100000
      - ENGAGEMENT_EXEMPLAR_BUDGET=100000
    # vLLM args forwarded by entrypoint_pysyft.sh via "$@". Must NOT include
    # --host or --port — the entrypoint prepends them targeting the loopback
    # so vLLM stays internal and the PySyft Datasite takes the public port.
    command: [
      "--model", "/tinfoil/mpk/mpk-fd70ffcf2c2ca3954546b3105150414bcba35838a6ee1a06c283887ad35287ab",
      "--tensor-parallel-size", "8",
      "--tool-call-parser", "glm47",
      "--reasoning-parser", "glm45",
      "--enable-auto-tool-choice",
      "--chat-template-content-format=string",
      "--served-model-name", "glm-5-1"
    ]
    healthcheck:
      # PySyft serves /api/v2/metadata pre-auth on the public port; reaching
      # it confirms the Datasite (and therefore upstream egress + vLLM) all
      # came up because entrypoint_pysyft.sh gates each stage on the previous
      # one's /health.
      #
      # ⚠️ M5 LESSON: this healthcheck passed throughout the worker-pool wedge
      #    (metadata stayed 200 while endpoint EXECUTION died). It confirms the
      #    Datasite is up, NOT that the consumer pool can run a job. Consider a
      #    deeper check that exercises an endpoint, but note that adds load and
      #    a failing deep-check + restart:always could crash-loop a slow-loading
      #    container. Left as metadata-only for now; flagged for the pilot.
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/v2/metadata"]
      interval: 30s
      timeout: 5s
      start_period: 90m     # GLM-5.1-FP8 (~745 GB) load time dominates.

shim:
  # Public port is the PySyft Datasite (8000). vLLM (8001) and egress
  # (8002) are loopback-only.
  upstream-port: 8000
  authenticated: false
  # PySyft 0.9.5 HTTP surface, locked from /openapi.json on a live 0.9.5
  # Datasite (see pysyft_spike/openapi_paths.txt). RPC for custom endpoints
  # goes through the single /api/v2/api_call route; the others are auth,
  # registration, metadata, and the API tree.
  #
  # Excluded:
  #   /api/v2/stream/{peer_uid}/{url_path}/  - FastAPI path params; Tinfoil
  #     exact-match shim can't allowlist. Phase 1 doesn't need streaming
  #     (no long-running job polling on our endpoints). Escalate if M2 fails
  #     with a streaming-related error.
  authenticated-endpoints:
    - /api/v2/
    - /api/v2/api
    - /api/v2/api_call
    - /api/v2/login
    - /api/v2/metadata
    - /api/v2/metadata_capnp
    - /api/v2/register
    - /api/v2/forgot_password
    - /api/v2/reset_password
  paths:
    - /api/v2/
    - /api/v2/api
    - /api/v2/api_call
    - /api/v2/login
    - /api/v2/metadata
    - /api/v2/metadata_capnp
    - /api/v2/register
    - /api/v2/forgot_password
    - /api/v2/reset_password