# Gradient sidecar (E3 / EII-2). Deploys prepilot-vllm-lens-grad.
# Reuses the same mpk as the Phase 2 deployment.

cvm-version: 0.7.5
cpus: 32
gpus: 8
memory: 524288   # 512 GB; org-waivered.

models:
  - name: "glm-5-1-fp8"
    repo: "zai-org/GLM-5.1-FP8@f396cf805182f4ca10fa675e1a99815b3ca384db"
    mpk: "fd70ffcf2c2ca3954546b3105150414bcba35838a6ee1a06c283887ad35287ab_756209401856_e085e6ab-593d-5f80-87e7-4a54100774cb"

containers:
  - name: "glm-5-1-prepilot-grad"
    image: "ghcr.io/atlaie/prepilot-vllm-lens-grad@sha256:e0f98849c7dedcfa0fd0d4f1fca25d6a2e5dd6c0c0ffa3a7ad5b936c3325748f"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    entrypoint: ["python3"]
    command: ["/opt/gradient_server.py"]
    env:
      - MODEL_PATH: "/tinfoil/mpk/mpk-fd70ffcf2c2ca3954546b3105150414bcba35838a6ee1a06c283887ad35287ab"
      - SERVED_MODEL_NAME: "glm-5-1-fp8"
      - PORT: "8001"
      - MAX_PROMPT_TOKENS: "2048"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 90m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/saliency
    - /v1/models
  paths:
    - /v1/saliency
    - /v1/models
    - /health