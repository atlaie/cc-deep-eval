name: Build and push prepilot images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.gradient'
      - 'Dockerfile.egress'
      - 'Dockerfile.pysyft-spike'
      - 'Dockerfile.pysyft'
      - 'gradient_server.py'
      - 'egress_service.py'
      - 'entrypoint_egress.sh'
      - 'entrypoint_pysyft.sh'
      - 'pysyft_datasite_spike_server.py'
      - 'pysyft_datasite_server.py'
      - 'pysyft_diag_server.py'
      - 'pysyft_endpoints/**'
      - 'vllm_lens_ext/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      benchbox_ref:
        description: 'cc-benchbox ref (branch, tag, or SHA) for the egress build'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            image: prepilot-vllm-lens
            needs_benchbox: false
          - dockerfile: Dockerfile.gradient
            image: prepilot-vllm-lens-grad
            needs_benchbox: false
          # egress-pipeline image. Needs cc-benchbox checked out alongside
          # for captures.py + phase3_egress_encoder.py.
          - dockerfile: Dockerfile.egress
            image: prepilot-vllm-lens-egress
            needs_benchbox: true
          # PySyft Datasite feasibility-spike image. Standalone build context.
          - dockerfile: Dockerfile.pysyft-spike
            image: prepilot-vllm-lens-pysyft-spike
            needs_benchbox: false
          # NEW: PySyft Mode B production image. Layers on the egress image,
          # so the egress build must complete first (matrix has no ordering;
          # in practice they run in parallel and the FROM digest in
          # Dockerfile.pysyft is what pins the base, not the egress matrix
          # entry timing). Does NOT need cc-benchbox — the egress base
          # image already contains captures.py + phase3_egress_encoder.py.
          - dockerfile: Dockerfile.pysyft
            image: prepilot-vllm-lens-pysyft
            needs_benchbox: false
    steps:
      - uses: actions/checkout@v4
      # Secondary checkout for the egress build only. Pin the ref via
      # workflow_dispatch input for reproducibility (defaults to 'main').
      - name: Checkout cc-benchbox
        uses: actions/checkout@v4
        with:
          repository: atlaie/cc-benchbox
          path: cc-benchbox
          ref: ${{ github.event.inputs.benchbox_ref || 'main' }}

      - name: Debug — confirm cc-benchbox checkout
        run: ls -la "$GITHUB_WORKSPACE/cc-benchbox" || (echo "cc-benchbox NOT in workspace"; exit 1)
      - name: Debug — workspace sizes and contents
        run: |
          echo "=== pwd ==="
          pwd
          echo
          echo "=== ls -la GITHUB_WORKSPACE ==="
          ls -la "$GITHUB_WORKSPACE"
          echo
          echo "=== du of workspace root and cc-benchbox ==="
          du -sh "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/cc-benchbox"
          echo
          echo "=== ls -la cc-benchbox (first 30) ==="
          ls -la "$GITHUB_WORKSPACE/cc-benchbox" | head -30
          echo
          echo "=== captures.py size ==="
          ls -la "$GITHUB_WORKSPACE/cc-benchbox/captures.py" 2>/dev/null \
            || echo "captures.py MISSING from cc-benchbox/"
          echo
          echo "=== any .dockerignore anywhere ==="
          find "$GITHUB_WORKSPACE" -name ".dockerignore" -maxdepth 3 -ls
          echo
          echo "=== any .gitignore that might affect docker ==="
          find "$GITHUB_WORKSPACE" -name ".gitignore" -maxdepth 2 -ls
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

      - run: |
          echo "Image: ${{ matrix.image }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Paste this into the corresponding tinfoil-config*.yml under containers[0].image"