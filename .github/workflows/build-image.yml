name: Build and push prepilot images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.gradient'
      - 'Dockerfile.egress'
      - 'Dockerfile.pysyft-spike'
      - 'Dockerfile.pysyft'
      - 'gradient_server.py'
      - 'egress_service.py'
      - 'entrypoint_egress.sh'
      - 'entrypoint_pysyft.sh'
      - 'pysyft_datasite_spike_server.py'
      - 'pysyft_datasite_server.py'
      - 'pysyft_diag_server.py'
      - 'pysyft_endpoints/**'
      - 'vllm_lens_ext/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      benchbox_ref:
        description: 'cc-benchbox ref (branch, tag, or SHA) for the egress build'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            image: prepilot-vllm-lens
            needs_benchbox: false
          - dockerfile: Dockerfile.gradient
            image: prepilot-vllm-lens-grad
            needs_benchbox: false
          - dockerfile: Dockerfile.egress
            image: prepilot-vllm-lens-egress
            needs_benchbox: true
          - dockerfile: Dockerfile.pysyft-spike
            image: prepilot-vllm-lens-pysyft-spike
            needs_benchbox: false
          - dockerfile: Dockerfile.pysyft
            image: prepilot-vllm-lens-pysyft
            needs_benchbox: false
    steps:
      # Free ~25 GB of disk on the runner. The egress base image extracts to
      # ~20 GB; default ubuntu-latest has only ~14 GB free, so any build that
      # FROMs egress (currently just pysyft) runs out of space mid-extraction.
      # Removes Android SDK, .NET, Haskell, Boost, large /opt directories —
      # none used by our builds. Safe across all matrix legs; a no-op cost
      # of ~30s on the lighter builds.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false   # keep $RUNNER_TOOL_CACHE (used by setup-* actions)
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false   # the buildx daemon needs its own cache
          swap-storage: true

      - uses: actions/checkout@v4
      - name: Checkout cc-benchbox
        uses: actions/checkout@v4
        with:
          repository: atlaie/cc-benchbox
          path: cc-benchbox
          ref: ${{ github.event.inputs.benchbox_ref || 'main' }}

      - name: Debug — confirm cc-benchbox checkout
        run: ls -la "$GITHUB_WORKSPACE/cc-benchbox" || (echo "cc-benchbox NOT in workspace"; exit 1)
      - name: Debug — disk space after free
        run: df -h /
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

      - run: |
          echo "Image: ${{ matrix.image }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Paste this into the corresponding tinfoil-config*.yml under containers[0].image"