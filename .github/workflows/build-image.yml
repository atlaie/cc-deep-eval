name: Build and push prepilot image

on:
  push:
    branches: [main]
    paths: ['Dockerfile']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/prepilot-vllm-lens:latest
            ghcr.io/${{ github.repository_owner }}/prepilot-vllm-lens:${{ github.sha }}

      - run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "Paste this into tinfoil-config.yml under containers[0].image"
