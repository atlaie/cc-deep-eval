name: Build and push prepilot images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.gradient'
      - 'gradient_server.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            image: prepilot-vllm-lens
          - dockerfile: Dockerfile.gradient
            image: prepilot-vllm-lens-grad
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

      - run: |
          echo "Image: ${{ matrix.image }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Paste this into the corresponding tinfoil-config*.yml under containers[0].image"