name: Build and push prepilot images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.gradient'
      - 'Dockerfile.egress'
      - 'gradient_server.py'
      - 'egress_service.py'
      - 'entrypoint_egress.sh'
      - 'vllm_lens_ext/**'
  workflow_dispatch:
    inputs:
      benchbox_ref:
        description: 'cc-benchbox ref (branch, tag, or SHA) for the egress build'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            image: prepilot-vllm-lens
            needs_benchbox: false
          - dockerfile: Dockerfile.gradient
            image: prepilot-vllm-lens-grad
            needs_benchbox: false
          # NEW: egress-pipeline image. Needs cc-benchbox checked out
          # alongside for captures.py + phase3_egress_encoder.py.
          - dockerfile: Dockerfile.egress
            image: prepilot-vllm-lens-egress
            needs_benchbox: true
    steps:
      - uses: actions/checkout@v4
      # Secondary checkout for the egress build only. Pin the ref via
      # workflow_dispatch input for reproducibility (defaults to 'main').
      # Remove the token: line if cc-benchbox is a public repo; keep it if
      # private (PAT stored as secrets.CC_BENCHBOX_PAT with `repo:read`).
      - name: Checkout cc-benchbox
        uses: actions/checkout@v4
        with:
          repository: atlaie/cc-benchbox
          path: cc-benchbox
          ref: ${{ github.event.inputs.benchbox_ref || 'main' }}

      - name: Debug — confirm cc-benchbox checkout
        run: ls -la "$GITHUB_WORKSPACE/cc-benchbox" || (echo "cc-benchbox NOT in workspace"; exit 1)

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

      - run: |
          echo "Image: ${{ matrix.image }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Paste this into the corresponding tinfoil-config*.yml under containers[0].image"